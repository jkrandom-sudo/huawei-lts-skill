name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen --extra dev
      - run: uv run pytest
      - run: uv run python scripts/generate_tools.py --check
      - run: bash -n install.sh uninstall.sh
      - name: Repository hygiene
        run: |
          ! rg -n '/Users/|/home/[^<]|AKIA[0-9A-Z]{16}|HUAWEI_ACCESS_KEY=[^R{]' \
            --glob '!uv.lock' --glob '!.github/workflows/ci.yml' .
